<h5>War Room Reports</h5>
<hr>
<div class="d-flex flex-wrap gap-2">
    <!-- KPI Cards section -->
    <div class="d-flex flex-wrap gap-2 w-100">
        @for (card of kpiCards(); track card.title) {
        <app-kpi-cards [card]="card"></app-kpi-cards>
        }
    </div>

    <!-- KPI Charts sections -->
    <div class="d-flex flex-wrap gap-2 w-100 mt-2 flex-wrap">
        <div class="custom-chart-spacing">

            @for (chart of kpiCharts(); track chart.title) {
            <app-charts [chart]="chart" [ngStyle]="{ 'width': chart.width }"></app-charts>
            }
        </div>
        <!-- Strategic Alerts Place -->
        <div class="bg-card info-place" style="width: 30%;">
            <p class="card-title">Strategic Alerts</p>
            <hr class="title-seperator">
            <div class="alerts-wrapper pe-1" tabindex="0" role="region" aria-labelledby="strategic-Alerts-section">
                @for(alert of actionItems(); track alert.id ){
                <app-strategic-alerts [alert]="alert"></app-strategic-alerts>
                }
            </div>
        </div>
    </div>

    <!-- Voter Feedback Table -->
    <div class="w-100 mt-1">
        <app-tables-component [title]="'Daily Report Summary - Key Metrics vs Target'" [dataForTable]="tableData()"
            [excludedKeys]="['id']" style="width: 100%;"></app-tables-component>
    </div>

</div>
