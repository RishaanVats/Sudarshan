    <div class="d-flex flex-wrap gap-2 mt-3 w-100">
        <div class="row w-100 gy-3">
            <div class="col col-sm-auto col-xl-8 flex-grow-1">
                <div class="chartAdjust" style="display: flex;"><app-charts class="flex-grow-1"
                        [chart]="kpiCharts()[0]"></app-charts></div>
            </div>
            <div class="col col-sm-4 col-xl-4 flex-grow-1">
                <div class="bg-card info-place">
                    <p class="card-title">Strategic Alerts</p>
                    <hr class="title-seperator">
                    <div class="alerts-wrapper pe-1" tabindex="0" role="region"
                        aria-labelledby="strategic-Alerts-section">
                        @for(alert of actionItems(); track alert.id ){
                        <app-strategic-alerts [alert]="alert"></app-strategic-alerts>
                        }
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Voter Feedback Table -->
    <div class="w-100 mt-1">
        <app-tables-component [title]="'Daily Report Summary - Key Metrics vs Target'" [dataForTable]="tableData()"
            [excludedKeys]="['id']" style="width: 100%;"></app-tables-component>
    </div>

</div>
