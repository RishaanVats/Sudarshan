<h5>Volunteer Operations</h5>
<hr>
<div class="d-flex flex-wrap gap-2">
    <!-- KPI Cards section -->
    <div class="d-flex gap-2 w-100">
        @for (card of kpiCards; track card.title) {
        <app-kpi-cards [card]="card"></app-kpi-cards>
        }
    </div>

    <!-- KPI Charts sections -->
    <div class="d-flex gap-2 w-100 mt-3 flex-wrap">
        @for (chart of kpiCharts; track chart.title) {
            <app-charts [chart]="chart" [ngStyle]="{ 'width': chart.width }"></app-charts>
        }
    </div>
</div>
